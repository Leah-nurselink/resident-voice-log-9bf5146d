name: Build Android APK

# Builds a debug APK on every push to main and every manual dispatch,
# then uploads it to the private `app-downloads` Supabase Storage bucket
# under an immutable versioned name and updates `latest.json`. The app serves
# route /api/public/download-apk (which mints a signed URL each request).
#
# Version numbers are derived automatically:
#   versionCode = GitHub run number (monotonically increasing)
#   versionName = 1.<run_number>.0+<short-sha>

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "name=1.${GITHUB_RUN_NUMBER}.0+${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install

      - name: Sync Capacitor (Android)
        run: bunx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        env:
          CARECORE_VERSION_CODE: ${{ steps.version.outputs.code }}
          CARECORE_VERSION_NAME: ${{ steps.version.outputs.name }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Extract signing cert SHA-256
        id: fingerprint
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          FP=$(keytool -printcert -jarfile "$APK" \
            | grep -m1 'SHA256:' \
            | awk '{print $2}')
          echo "sha256=$FP" >> "$GITHUB_OUTPUT"
          echo "Debug signing cert SHA-256: $FP"

      - name: Stage artifacts
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk dist-apk/carecore.apk
          cat > dist-apk/latest.json <<JSON
          {
            "object": "carecore-${{ github.sha }}.apk",
            "versionCode": ${{ steps.version.outputs.code }},
            "versionName": "${{ steps.version.outputs.name }}",
            "commit": "${{ github.sha }}"
          }
          JSON
          cat > dist-apk/assetlinks.json <<JSON
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "app.lovable.residentvoicelog",
              "sha256_cert_fingerprints": ["${{ steps.fingerprint.outputs.sha256 }}"]
            }
          }]
          JSON

      - name: Upload workflow artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: carecore-android-debug
          path: dist-apk/

      - name: Upload versioned APK and latest manifest
        env:
          APK_UPLOAD_ENDPOINT: https://resident-voice-log.lovable.app/api/public/upload-apk-url
          APK_UPLOAD_TOKEN: ${{ secrets.APK_UPLOAD_TOKEN }}
        run: |
          if [ -z "$APK_UPLOAD_TOKEN" ]; then
            echo "::error::APK_UPLOAD_TOKEN GitHub Actions secret is required"
            exit 1
          fi
          request_upload_url() {
            local object_name="$1"
            local response_file="$2"
            local http_code
            http_code=$(curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $APK_UPLOAD_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"object\":\"$object_name\"}" \
              "$APK_UPLOAD_ENDPOINT")
            if [ "$http_code" != "200" ]; then
              echo "::error::Failed to get upload URL for $object_name (HTTP $http_code)"
              cat "$response_file"
              exit 1
            fi
            jq -r '.url' "$response_file"
          }

          upload_file() {
            local object_name="$1"
            local file_path="$2"
            local content_type="$3"
            local response_file="/tmp/sign-${object_name//[^a-zA-Z0-9]/_}.json"
            local signed_url
            signed_url=$(request_upload_url "$object_name" "$response_file")
            if [ -z "$signed_url" ] || [ "$signed_url" = "null" ]; then
              echo "::error::Signed URL missing for $object_name"
              cat "$response_file"
              exit 1
            fi
            echo "Uploading $object_name..."
            local upload_code
            upload_code=$(curl -sS -o /tmp/upload-response.txt -w "%{http_code}" \
              -X PUT \
              -H "Content-Type: $content_type" \
              -H "x-upsert: true" \
              --data-binary "@$file_path" \
              "$signed_url")
            if [ "$upload_code" != "200" ] && [ "$upload_code" != "201" ]; then
              echo "::error::Upload failed for $object_name (HTTP $upload_code)"
              cat /tmp/upload-response.txt
              exit 1
            fi
          }

          APK_OBJECT="carecore-${GITHUB_SHA}.apk"
          upload_file "$APK_OBJECT" dist-apk/carecore.apk application/vnd.android.package-archive
          # Upload the pointer last so users never receive a partly published build.
          upload_file latest.json dist-apk/latest.json application/json
          echo "✅ Versioned APK published successfully"
