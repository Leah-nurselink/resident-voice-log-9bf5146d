name: Build Android APK

# Builds a debug APK on every push to main and every manual dispatch,
# then publishes it as a GitHub Release named `android-latest` so users
# can download it directly from the Downloads page in the app.

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write   # required to create/update the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Sync Capacitor (Android)
        run: bunx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk dist-apk/carecore.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: carecore-android-debug
          path: dist-apk/carecore.apk

      - name: Publish/refresh `android-latest` release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: CareCore Android (latest debug build)
          body: |
            Automatically built from commit ${{ github.sha }}.

            **Install on your phone**
            1. On the phone, open this page and tap `carecore.apk` below.
            2. Allow install from unknown sources when Android asks.
            3. Open the CareCore app icon (NOT Chrome), sign in, go to Devices.
            4. Grant Nearby-devices permission — you should see the green
               "Native app mode" banner and real beacons.
          files: dist-apk/carecore.apk
          make_latest: "true"
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
