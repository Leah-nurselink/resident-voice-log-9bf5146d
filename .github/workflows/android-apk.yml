name: Build Android APK

# Builds a debug APK on every push to main and every manual dispatch,
# then uploads it to the private `app-downloads` Supabase Storage bucket
# as `carecore.apk`. The app serves it to phones via the public server
# route /api/public/download-apk (which mints a signed URL each request).
#
# Version numbers are derived automatically:
#   versionCode = GitHub run number (monotonically increasing)
#   versionName = 1.<run_number>.0+<short-sha>

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "name=1.${GITHUB_RUN_NUMBER}.0+${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install

      - name: Sync Capacitor (Android)
        run: bunx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        env:
          CARECORE_VERSION_CODE: ${{ steps.version.outputs.code }}
          CARECORE_VERSION_NAME: ${{ steps.version.outputs.name }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Extract signing cert SHA-256
        id: fingerprint
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          FP=$(keytool -printcert -jarfile "$APK" \
            | grep -m1 'SHA256:' \
            | awk '{print $2}')
          echo "sha256=$FP" >> "$GITHUB_OUTPUT"
          echo "Debug signing cert SHA-256: $FP"

      - name: Stage artifacts
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk dist-apk/carecore.apk
          cat > dist-apk/assetlinks.json <<JSON
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "app.lovable.residentvoicelog",
              "sha256_cert_fingerprints": ["${{ steps.fingerprint.outputs.sha256 }}"]
            }
          }]
          JSON

      - name: Upload workflow artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: carecore-android-debug
          path: dist-apk/

      - name: Upload APK to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY GitHub Actions secrets are required"
            exit 1
          fi
          echo "Uploading carecore.apk to app-downloads bucket..."
          HTTP_CODE=$(curl -sS -o /tmp/upload-response.txt -w "%{http_code}" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "x-upsert: true" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "Cache-Control: no-cache" \
            --data-binary @dist-apk/carecore.apk \
            "$SUPABASE_URL/storage/v1/object/app-downloads/carecore.apk")
          echo "HTTP $HTTP_CODE"
          cat /tmp/upload-response.txt
          echo
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::APK upload failed"
            exit 1
          fi
          echo "✅ APK uploaded successfully"
